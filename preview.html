<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>iamunknown77</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }

  /* ── BANNER ── */
  .banner {
    position:relative; width:860px; height:180px;
    background:#0d1117; border:1px solid rgba(0,255,65,.45);
    overflow:hidden; font-family:'Share Tech Mono',monospace;
  }
  .banner::before {             /* scan sweep */
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg,transparent 40%,rgba(0,255,65,.05) 50%,transparent 60%);
    animation:scan 3.5s linear infinite;
  }
  @keyframes scan { from{transform:translateY(-180px)} to{transform:translateY(180px)} }

  /* grid */
  .grid { position:absolute; inset:0; pointer-events:none; }

  /* corners */
  .corner { position:absolute; width:18px; height:18px; border-color:#00ff41; border-style:solid; opacity:.75; }
  .corner.tl { top:4px; left:4px;  border-width:2px 0 0 2px; }
  .corner.tr { top:4px; right:4px; border-width:2px 2px 0 0; }
  .corner.bl { bottom:4px; left:4px;  border-width:0 0 2px 2px; }
  .corner.br { bottom:4px; right:4px; border-width:0 2px 2px 0; }

  /* matrix canvas */
  #matrix { position:absolute; top:0; left:0; opacity:.55; }

  /* main content */
  .content { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  /* status bars */
  .status-top, .status-bot {
    position:absolute; left:90px; right:90px;
    font-size:11px; color:#00ff41; opacity:.45; letter-spacing:.05em;
  }
  .status-top { top:14px; display:flex; justify-content:space-between; }
  .status-bot { bottom:14px; display:flex; justify-content:space-between; align-items:center; }

  /* glitch name */
  .name-wrap { position:relative; }
  .name {
    font-size:42px; font-weight:700; color:#00ff41;
    text-shadow: 0 0 8px #00ff41, 0 0 20px #00ff4180;
    letter-spacing:.04em; position:relative; z-index:3;
    animation:glitch 8s infinite;
  }
  .name-r {
    position:absolute; top:0; left:0; right:0; text-align:center;
    font-size:42px; font-weight:700; color:#ff003380;
    letter-spacing:.04em; animation:glitchR 8s infinite; pointer-events:none;
  }
  .name-c {
    position:absolute; top:0; left:0; right:0; text-align:center;
    font-size:42px; font-weight:700; color:#00ffff40;
    letter-spacing:.04em; animation:glitchC 8s infinite; pointer-events:none;
  }
  @keyframes glitch {
    0%,89%,100%{ transform:none; opacity:1; }
    90%{ transform:translateX(-3px); opacity:.9; }
    91%{ transform:translateX(3px) skewX(1deg); }
    92%{ transform:translateX(-2px); }
    93%{ transform:none; opacity:1; }
    95%{ transform:translateX(2px) skewX(-1deg); opacity:.8; }
    96%{ transform:none; opacity:1; }
  }
  @keyframes glitchR {
    0%,89%,100%{ transform:translateX(0); opacity:0; }
    90%{ transform:translateX(4px); opacity:1; }
    91%{ transform:translateX(-2px); opacity:.7; }
    93%{ opacity:0; }
  }
  @keyframes glitchC {
    0%,89%,100%{ transform:translateX(0); opacity:0; }
    90%{ transform:translateX(-4px); opacity:1; }
    92%{ opacity:.5; }
    93%{ opacity:0; }
  }

  /* b64 cycle */
  .b64-wrap { position:relative; height:22px; margin-top:6px; }
  .b64-plain, .b64-encoded {
    position:absolute; width:100%; text-align:center;
    font-size:13px; letter-spacing:.08em; transition:opacity .4s;
  }
  .b64-plain   { color:#00ff41; opacity:1; animation:b64a 6s ease-in-out infinite; }
  .b64-encoded { color:#39ff14; opacity:0; animation:b64b 6s ease-in-out infinite; }
  @keyframes b64a { 0%,30%{opacity:1} 40%,70%{opacity:0} 80%,100%{opacity:1} }
  @keyframes b64b { 0%,30%{opacity:0} 40%,70%{opacity:1} 80%,100%{opacity:0} }

  /* pulse ring */
  .ring {
    position:absolute; border:1px solid #00ff41;
    border-radius:50%; width:420px; height:56px;
    top:50%; left:50%; transform:translate(-50%,-50%);
    animation:ring 4s ease-in-out infinite; pointer-events:none;
  }
  @keyframes ring {
    0%,100%{ opacity:.07; transform:translate(-50%,-50%) scaleX(1); }
    50%{ opacity:.18; transform:translate(-50%,-50%) scaleX(1.05); }
  }

  /* cursor blink */
  .cursor {
    display:inline-block; width:8px; height:14px;
    background:#00ff41; margin-left:4px; vertical-align:middle;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* border pulse */
  .banner { animation:borderPulse 3s ease-in-out infinite; }
  @keyframes borderPulse {
    0%,100%{ border-color:rgba(0,255,65,.35); }
    50%{ border-color:rgba(0,255,65,.85); box-shadow:0 0 12px rgba(0,255,65,.2); }
  }
</style>
</head>
<body>

<div class="banner">
  <!-- matrix canvas -->
  <canvas id="matrix" width="860" height="180"></canvas>

  <!-- corners -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- pulse ring -->
  <div class="ring"></div>

  <!-- status bars -->
  <div class="status-top">
    <span>[ SYSTEM INITIALIZED ]</span>
    <span>ACCESS: GRANTED</span>
  </div>

  <!-- main -->
  <div class="content">
    <div class="name-wrap">
      <div class="name-r">iamunknown77</div>
      <div class="name-c">iamunknown77</div>
      <div class="name" style="text-align:center;">iamunknown77</div>
    </div>
    <div class="b64-wrap">
      <div class="b64-plain">[ iamunknown77 ]</div>
      <div class="b64-encoded">aWFtdW5rbm93bjc3</div>
    </div>
  </div>

  <div class="status-bot">
    <span>&gt; COOLXPLO :: RED TEAM OPERATOR<span class="cursor"></span></span>
    <span>STATUS: ONLINE_</span>
  </div>
</div>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const W = 860, H = 180;
const FONT = 12;
const cols = Math.floor(W / FONT);

// only use left ~6 cols and right ~6 cols for rain
const leftCols  = 6;
const rightCols = 6;
const rightStart = cols - rightCols;

const chars = '01アウエオネトカキクケイ';
const drops = Array(cols).fill(1);

function active(i) {
  return i < leftCols || i >= rightStart;
}

function draw() {
  ctx.fillStyle = 'rgba(13,17,23,0.18)';
  ctx.fillRect(0, 0, W, H);
  ctx.font = FONT + 'px "Share Tech Mono", monospace';

  for (let i = 0; i < cols; i++) {
    if (!active(i)) continue;
    const ch = chars[Math.floor(Math.random() * chars.length)];
    const x = i * FONT;
    const y = drops[i] * FONT;

    // head bright
    ctx.fillStyle = '#ccffcc';
    ctx.fillText(ch, x, y);

    // trail
    const trail = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = 'rgba(0,255,65,0.55)';
    ctx.fillText(trail, x, y - FONT);

    if (y > H && Math.random() > 0.92) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(draw, 60);
</script>
</body>
</html>
